name: Determinism harness

# Root-stability regression testing for every PR and push to main.
# For a system whose core claim is "same build, same root," determinism
# across repeated traces is as important as the unit test suite.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast pre-check: build the userspace binary and run unit tests.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Build and run unit tests
        run: nix develop -c cargo test -p repx

  # Determinism harness: smoke test (simple C compilation) with 20 repeated traces.
  harness-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Build repx
        run: nix build
      - name: Smoke determinism harness (20 runs)
        run: sudo nix run .#test-determinism -- smoke

  # Build-system matrix determinism: Make, CMake/Ninja, Cargo, Go (20 runs each).
  harness-build-systems:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Build repx
        run: nix build
      - name: Build-system determinism harness (20 runs each)
        run: sudo nix run .#test-determinism -- build-systems

  # Nix-build determinism: trace a nix-build invocation 20 times.
  harness-nix-build:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Build repx
        run: nix build
      - name: Nix-build determinism harness (20 runs)
        run: sudo nix run .#test-determinism -- nix-build
